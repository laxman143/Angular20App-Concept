name: AI Issue Fix

on:
  issues:
    types: [opened]
  workflow_dispatch: {}

jobs:
  ai-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      # Provide a Hugging Face API key (free tier available) or set to empty
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      # Default branch to create PRs against (set to 'master' as requested)
      BASE_BRANCH: master

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Debug event payload
        run: |
          echo "GITHUB_EVENT_PATH=$GITHUB_EVENT_PATH"
          mkdir -p .ai-fix
          if [ -f "$GITHUB_EVENT_PATH" ]; then cp "$GITHUB_EVENT_PATH" .ai-fix/event.json && echo "Saved event payload to .ai-fix/event.json"; else echo "No event payload file found"; fi
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-fix-event
          path: .ai-fix/event.json

      - name: Check HuggingFace API key
        run: |
          if [ -z "${HUGGINGFACE_API_KEY}" ]; then echo "HUGGINGFACE_API_KEY secret is missing. Add it in repo Settings → Secrets → Actions."; exit 1; fi
        env:
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}

      - name: Use Node.js 20 (v20.19.0+ required by Angular CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Prepare AI fix (run generator)
        id: prepare
        run: |
          node ai-fix-angular.js --prepare
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_TOKEN: ${{ secrets.G_TOKEN }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}

      - name: Build
        run: npm run build

      - name: Run tests
        run: |
          if npm run | grep -q " test"; then npm run test --if-present -- --watch=false; else echo "No tests defined"; fi

      - name: Finalize commit and create PR
        if: success()
        run: |
          node ai-fix-angular.js --finalize
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_TOKEN: ${{ secrets.G_TOKEN }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          BASE_BRANCH: ${{ env.BASE_BRANCH }}

      - name: Upload ai-fix artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-fix-debug
          path: .ai-fix
